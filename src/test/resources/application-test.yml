spring:
  sql:
    init:
      mode: embedded
      schema-locations: classpath:db/sql/h2-schema-test.sql
      data-locations: classpath:db/sql/h2-data-test.sql
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:test
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate